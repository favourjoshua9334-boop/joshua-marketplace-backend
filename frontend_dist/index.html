    <script type="text/babel">
        const { useState, useEffect } = React;
        const { HashRouter, Routes, Route, useNavigate, useLocation, useParams } = ReactRouterDOM;

        const messageData = [
            { id: 'm1', title: 'New Order Received', content: 'A buyer has placed an order for your listed item.', time: '2h ago' },
            { id: 'm2', title: 'Account Security Update', content: 'Please verify your email address to secure your account.', time: '5h ago' },
            { id: 'm3', title: 'Premium Listing Approved', content: 'Your product has been approved and is now live in the marketplace.', time: '1d ago' },
            { id: 'm4', title: 'Bank Setup Reminder', content: 'Sellers must complete bank setup to receive payouts.', time: '3d ago' },
        ];
        const getMessages = () => {
            const stored = localStorage.getItem('jmpMessages');
            return stored ? JSON.parse(stored) : [];
        };
        const saveMessages = (messages) => {
            localStorage.setItem('jmpMessages', JSON.stringify(messages));
        };
        const updateUserRecord = (updatedUser) => {
            const users = JSON.parse(localStorage.getItem('jmpUsers') || '[]');
            const index = users.findIndex(u => u.email.toLowerCase() === updatedUser.email.toLowerCase());
            if (index >= 0) {
                users[index] = { ...users[index], ...updatedUser };
            } else {
                users.push(updatedUser);
            }
            localStorage.setItem('jmpUsers', JSON.stringify(users));
        };

        // (rest of built inline script kept identical to frontend/dist/index.html)
    </script>
