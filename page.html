        const messageData = [
            { id: 'm1', title: 'New Order Received', content: 'A buyer has placed an order for your listed item.', time: '2h ago' },

        const saveMessages = (messages) => {
            localStorage.setItem('jmpMessages', JSON.stringify(messages));
        };
        const updateUserRecord = (updatedUser) => {
            const users = JSON.parse(localStorage.getItem('jmpUsers') || '[]');
            const index = users.findIndex(u => u.email.toLowerCase() === updatedUser.email.toLowerCase());
            if (index >= 0) {
                users[index] = { ...users[index], ...updatedUser };
            } else {
                users.push(updatedUser);
            }
            localStorage.setItem('jmpUsers', JSON.stringify(users));
        };

        const LandingPage = () => {
            const navigate = useNavigate();

            const [lastClickTime, setLastClickTime] = useState(0);

            const handleLogoClick = () => {
                const now = Date.now();
                if (now - lastClickTime > 2000) {
                    setClickCount(1);
                } else {
                    setClickCount(prev => prev + 1);
                }
                setLastClickTime(now);

                if (clickCount + 1 >= 4) {
                    navigate('/admin-login');
                    setClickCount(0);
                }

        const Signup = () => {
            const navigate = useNavigate();
            const [firstName, setFirstName] = useState('');
            const [lastName, setLastName] = useState('');
            const [email, setEmail] = useState('');
            const [phone, setPhone] = useState('');
            const [password, setPassword] = useState('');
            const [role, setRole] = useState('');
            const [businessWhatsApp, setBusinessWhatsApp] = useState('');
            const [businessAddress, setBusinessAddress] = useState('');
            const [error, setError] = useState('');

            const getExistingUsers = () => {
                const users = localStorage.getItem('jmpUsers');
                return users ? JSON.parse(users) : [];
            };

            const existingUsers = getExistingUsers();
            const existingEmails = existingUsers.map(u => u.email.toLowerCase());
            const existingPhones = existingUsers.map(u => u.phone);

            const createUsername = (first, last) => {
                const base = `${first.trim().toLowerCase()}${last.trim().toLowerCase()}`.replace(/[^a-z0-9]/g, '');
                const suffix = Math.floor(100 + Math.random() * 900);
                return `${base || 'user'}${suffix}`;
            };

            const validatePassword = (value) => {
                const strongRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/;
                return strongRegex.test(value);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                setError('');

                if (!firstName || !lastName || !email || !phone || !password || !role) {
                    setError('All fields are required.');
                    return;
                }

                if (role === 'seller' && (!businessWhatsApp || !businessAddress)) {
                    setError('Business WhatsApp and Address are required for sellers.');
                    return;
                }

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    setError('Enter a valid email address.');
                    return;
                }

                const phoneRegex = /^\+?[0-9]{7,15}$/;
                if (!phoneRegex.test(phone)) {
                    setError('Enter a valid phone number with country code.');
                    return;
                }

                if (!validatePassword(password)) {
                    setError('Password must include uppercase, lowercase, number, and special character.');
                    return;
                }

                if (existingEmails.includes(email.toLowerCase())) {
                    setError('This email is already registered.');
                    return;
                }

                if (existingPhones.includes(phone)) {
                    setError('This phone number is already registered.');
                    return;
                }

                const fullName = `${firstName.trim()} ${lastName.trim()}`;

                try {
                    await window.backendApi.registerUser({
                        name: fullName,
                        email,
                        password,
                        userType: role,
                        businessWhatsApp: role === 'seller' ? businessWhatsApp : '',
                        businessAddress: role === 'seller' ? businessAddress : ''
                    });
                    navigate('/login');
                } catch (error) {
                    setError(error.message || 'Registration failed. Please try again.');
                }
            };

            return (
                <div className="min-h-screen bg-[#0b0b0b] text-white flex items-center justify-center px-4">
                    <div className="w-full max-w-md bg-[#111111] border border-[#D4AF37] rounded-3xl p-8 shadow-2xl shadow-[#D4AF37]/10">
                        <h1 className="text-4xl text-[#D4AF37] text-center mb-6 font-bold">Create Account</h1>
                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label htmlFor="firstName" className="block text-sm font-medium text-gray-300 mb-2">First Name</label>
                                    <input
                                        id="firstName"
                                        type="text"
                                        value={firstName}
                                        onChange={(e) => setFirstName(e.target.value)}
                                        className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white focus:outline-none focus:ring-2 focus:ring-[#D4AF37] focus:border-transparent"
                                        placeholder="First name"
                                    />
                                </div>
                                <div>
                                    <label htmlFor="lastName" className="block text-sm font-medium text-gray-300 mb-2">Last Name</label>
                                    <input
                                        id="lastName"
                                        type="text"
                                        value={lastName}
                                        onChange={(e) => setLastName(e.target.value)}
                                        className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white focus:outline-none focus:ring-2 focus:ring-[#D4AF37] focus:border-transparent"
                                        placeholder="Last name"
                                    />
                                </div>
                            </div>
                            <div>
                                <label htmlFor="email" className="block text-sm font-medium text-gray-300 mb-2">Email</label>
                                <input
                                    id="email"
                                    type="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white focus:outline-none focus:ring-2 focus:ring-[#D4AF37] focus:border-transparent"
                                    placeholder="Enter your email"
                                />
                            </div>
                            <div>
                                <label htmlFor="phone" className="block text-sm font-medium text-gray-300 mb-2">Phone</label>
                                <input
                                    id="phone"
                                    type="tel"
                                    value={phone}
                                    onChange={(e) => setPhone(e.target.value)}
                                    className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white focus:outline-none focus:ring-2 focus:ring-[#D4AF37] focus:border-transparent"
                                    placeholder="+1234567890"
                                />
                            </div>
                            <div>
                                <label htmlFor="password" className="block text-sm font-medium text-gray-300 mb-2">Password</label>
                                <input
                                    id="password"
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white focus:outline-none focus:ring-2 focus:ring-[#D4AF37] focus:border-transparent"
                                    placeholder="Enter a strong password"
                                />
                            </div>
                            <div>
                                <label htmlFor="role" className="block text-sm font-medium text-gray-300 mb-2">Who are you?</label>
                                <select
                                    id="role"
                                    value={role}
                                    onChange={(e) => setRole(e.target.value)}
                                    className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white focus:outline-none focus:ring-2 focus:ring-[#D4AF37] focus:border-transparent"
                                >
                                    <option value="">Select an option</option>
                                    <option value="seller">I am a seller and will post products</option>
                                    <option value="buyer">I am not a seller</option>
                                </select>
                            </div>
                            {role === 'seller' && (
                                <>
                                    <div>
                                        <label htmlFor="businessWhatsApp" className="block text-sm font-medium text-gray-300 mb-2">Business WhatsApp Number</label>
                                        <input
                                            id="businessWhatsApp"
                                            type="tel"
                                            value={businessWhatsApp}
                                            onChange={(e) => setBusinessWhatsApp(e.target.value)}
                                            className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white focus:outline-none focus:ring-2 focus:ring-[#D4AF37] focus:border-transparent"
                                            placeholder="+1234567890"
                                        />
                                    </div>
                                    <div>
                                        <label htmlFor="businessAddress" className="block text-sm font-medium text-gray-300 mb-2">Business Address</label>
                                        <textarea
                                            id="businessAddress"
                                            value={businessAddress}
                                            onChange={(e) => setBusinessAddress(e.target.value)}
                                            className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white focus:outline-none focus:ring-2 focus:ring-[#D4AF37] focus:border-transparent"
                                            placeholder="Enter your business address"
                                            rows="3"
                                        />
                                    </div>
                                </>
                            )}
                            {error && (
                                <div className="text-red-400 text-sm text-center">
                                    {error}
                                </div>
                            )}
                            <button
                                type="submit"
                                className="w-full bg-[#D4AF37] text-black py-3 rounded-full font-semibold hover:bg-opacity-80 transition-colors"
                            >
                                Create Account
                            </button>
                        </form>
                        <div className="mt-6 text-center">
                            <a href="#" onClick={() => navigate('/')} className="text-[#D4AF37] hover:underline">Back to Home</a>
                        </div>
                    </div>
                </div>
            );
        };

        const Login = () => {
            const navigate = useNavigate();
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                setError('');

                // Basic validation
                if (!email || !password) {
                    setError('Please fill in all fields.');
                    return;
                }

                // Simple email validation
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    setError('Please enter a valid email address.');
                    return;
                }

                try {
                    await window.backendApi.loginUser({ email, password });
                    window.location.href = 'Marketplace.html';
                } catch (error) {
                    setError(error.message || 'Invalid email or password.');
                }
            };

            return (
                <div className="min-h-screen bg-[#0b0b0b] text-white flex items-center justify-center px-4">
                    <div className="w-full max-w-md">
                        <h1 className="text-4xl text-[#D4AF37] text-center mb-8 font-bold">Login</h1>
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div>
                                <label htmlFor="email" className="block text-sm font-medium text-gray-300 mb-2">Email</label>
                                <input
                                    type="email"
                                    id="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white focus:outline-none focus:ring-2 focus:ring-[#D4AF37] focus:border-transparent"
                                    placeholder="Enter your email"
                                />
                            </div>
                            <div>
                                <label htmlFor="password" className="block text-sm font-medium text-gray-300 mb-2">Password</label>
                                <input
                                    type="password"
                                    id="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white focus:outline-none focus:ring-2 focus:ring-[#D4AF37] focus:border-transparent"
                                    placeholder="Enter your password"
                                />
                            </div>
                            {error && (
                                <div className="text-red-400 text-sm text-center">
                                    {error}
                                </div>
                            )}
                            <button
                                type="submit"
                                className="w-full bg-[#D4AF37] text-black py-3 px-4 rounded-md font-semibold hover:bg-opacity-80 transition-colors"
                            >
                                Sign In
                            </button>
                        </form>
                        <div className="mt-6 text-center">
                            <a href="#" onClick={() => navigate('/')} className="text-[#D4AF37] hover:underline">Back to Home</a>
                        </div>
                    </div>
                </div>
            );
        };

        const AdminLogin = () => {
            const navigate = useNavigate();
            const [email, setEmail] = useState('');
            const [pin, setPin] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                setError('');

                if (email !== 'oluwapelumif0@gmail.com' || pin !== '655584091') {
                    setError('Access denied.');
                    return;
                }

                localStorage.setItem('jmpAdminAccess', 'true');
                window.location.href = './admin.html';
            };

            return (
                <div className="min-h-screen bg-[#0b0b0b] text-white flex items-center justify-center px-4">
                    <div className="w-full max-w-md bg-[#111111] border border-[#D4AF37] rounded-3xl p-8 shadow-2xl shadow-[#D4AF37]/10">
                        <h1 className="text-4xl text-[#D4AF37] text-center mb-8 font-bold">Admin Login</h1>
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div>
                                <label htmlFor="adminEmail" className="block text-sm font-medium text-gray-300 mb-2">Email</label>
                                <input
                                    id="adminEmail"
                                    type="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white focus:outline-none focus:ring-2 focus:ring-[#D4AF37] focus:border-transparent"
                                    placeholder="Enter admin email"
                                />
                            </div>
                            <div>
                                <label htmlFor="adminPin" className="block text-sm font-medium text-gray-300 mb-2">PIN</label>
                                <input
                                    id="adminPin"
                                    type="password"
                                    inputMode="numeric"
                                    pattern="[0-9]*"
                                    value={pin}
                                    onChange={(e) => setPin(e.target.value.replace(/\D/g, ''))}
                                    className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white focus:outline-none focus:ring-2 focus:ring-[#D4AF37] focus:border-transparent"
                                    placeholder="Enter PIN"
                                />
                            </div>
                            {error && (
                                <div className="text-red-400 text-sm text-center">{error}</div>
                            )}
                            <button
                                type="submit"
                                className="w-full bg-[#D4AF37] text-black py-3 rounded-full font-semibold hover:bg-opacity-80 transition-colors"
                            >
                                Unlock Admin
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const ProfileSetup = () => {
            const location = useLocation();
            const navigate = useNavigate();
            const [username, setUsername] = useState('');
            const [firstName, setFirstName] = useState('');
            const [lastName, setLastName] = useState('');
            const [email, setEmail] = useState('');
            const [phone, setPhone] = useState('');
            const [picture, setPicture] = useState('');
            const [isSeller, setIsSeller] = useState(false);
            const [error, setError] = useState('');

            useEffect(() => {
                const savedProfile = localStorage.getItem('jmpProfile');
                const state = location.state;

                if (savedProfile) {
                    const profile = JSON.parse(savedProfile);
                    setUsername(profile.username || '');
                    setFirstName(profile.firstName || '');
                    setLastName(profile.lastName || '');
                    setEmail(profile.email || '');
                    setPhone(profile.phone || '');
                    setPicture(profile.picture || '');
                    setIsSeller(profile.isSeller || false);
                }

                if (state) {
                    setUsername(state.username || '');
                    setFirstName(state.firstName || '');
                    setLastName(state.lastName || '');
                    setEmail(state.email || '');
                }
            }, [location.state]);

            const handlePictureChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => setPicture(reader.result);
                reader.readAsDataURL(file);
            };

            const generateUsername = (first, last) => {
                const base = `${first.trim().toLowerCase()}${last.trim().toLowerCase()}`.replace(/[^a-z0-9]/g, '');
                const suffix = Math.floor(100 + Math.random() * 900);
                return `${base || 'user'}${suffix}`;
            };

            const validateEmail = (value) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
            const validatePhone = (value) => /^\+?[0-9]{7,15}$/.test(value);

            const handleSave = (e) => {
                e.preventDefault();
                setError('');

                if (!firstName || !lastName || !email || !phone) {
                    setError('Please complete all fields.');
                    return;
                }

                if (!validateEmail(email)) {
                    setError('Please enter a valid email address.');
                    return;
                }

                if (!validatePhone(phone)) {
                    setError('Please enter a valid phone number with country code.');
                    return;
                }

                const finalUsername = username || generateUsername(firstName, lastName);
                const profile = {
                    username: finalUsername,
                    firstName,
                    lastName,
                    email,
                    phone,

        const Dashboard = () => {
            const navigate = useNavigate();
            const [currentUser, setCurrentUser] = useState(null);
            const [userProducts, setUserProducts] = useState([]);
            const [showAddProduct, setShowAddProduct] = useState(false);
            const [showEditProfile, setShowEditProfile] = useState(false);
            const [formData, setFormData] = useState({ title: '', description: '', price: '', category: '', subcategory: '', images: [] });

            const [profileData, setProfileData] = useState({});
            const [allProducts, setAllProducts] = useState([]);

            useEffect(() => {
                const user = localStorage.getItem('jmpCurrentUser');
                if (!user) {
                    navigate('/');
                    return;
                }
                const userData = JSON.parse(user);
                setCurrentUser(userData);
                setProfileData(userData);
                loadUserProducts(userData.email);
                loadMessages(userData.email);
                loadAllProducts();
            }, []);

            const loadUserProducts = (email) => {
                const products = localStorage.getItem('jmpProducts');
                if (products) {
                    const productList = JSON.parse(products);
                    const userProds = productList.filter(p => p.userEmail === email);
                    setUserProducts(userProds);
                }
            };

            const loadMessages = (email) => {
                const msgs = localStorage.getItem('jmpMessages');
                if (msgs) {
                    const msgList = JSON.parse(msgs);
                    const userMsgs = msgList
                        .filter(m => m.recipientEmail === email)
                        .map(m => ({ ...m, read: m.read ?? false }));
                    setMessages(userMsgs);
                }
            };

            const loadAllProducts = () => {
                const products = localStorage.getItem('jmpProducts');
                if (products) {
                    const productList = JSON.parse(products);
                    const approved = productList.filter(p => p.status === 'Approved');
                    setAllProducts(approved);
                }

            const handleAddProduct = async (e) => {
                e.preventDefault();
                if (!formData.title || !formData.description || !formData.price) {
                    alert('Please fill in all fields');
                    return;

                if (!formData.images || formData.images.length === 0) {
                    alert('Please upload at least one product image.');
                    return;
                }

                const images = [];
                if (formData.images) {
                    for (let file of formData.images) {
                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        await new Promise(resolve => reader.onload = resolve);
                        images.push(reader.result);
                    }
                }

                const newProduct = {
                    id: Date.now().toString(),
                    title: formData.title,
                    description: formData.description,
                    price: formData.price,
                    images: images,
                    userEmail: currentUser.email,
                    userName: `${currentUser.firstName} ${currentUser.lastName}`,
                    status: 'Pending',
                    createdAt: new Date().toISOString().split('T')[0]
                };

                const products = localStorage.getItem('jmpProducts');
                const productList = products ? JSON.parse(products) : [];
                productList.push(newProduct);
                localStorage.setItem('jmpProducts', JSON.stringify(productList));

                setUserProducts([...userProducts, newProduct]);
                setFormData({ title: '', description: '', price: '', images: [] });
                setShowAddProduct(false);
                alert('Product submitted successfully. Waiting for admin approval.');

                                            {favorites.length}
                                        </span>
                                    )}
                                </button>
                                <button
                                    onClick={() => navigate('/cart')}
                                    className="relative border border-[#D4AF37] text-[#D4AF37] px-4 py-2 rounded-full hover:bg-[#D4AF37] hover:text-black transition-colors flex items-center gap-2"
                                >
                                    🛒 Cart
                                    {cart.length > 0 && (
                                        <span className="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">
                                            {cart.length}
                                        </span>
                                    )}
                                </button>
                                <button
                                    onClick={() => navigate('/inbox')}
                                    className="relative border border-[#D4AF37] text-[#D4AF37] px-4 py-2 rounded-full hover:bg-[#D4AF37] hover:text-black transition-colors flex items-center gap-2"
                                >
                                    📬 Inbox
                                    {unreadCount > 0 && (
                                        <span className="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">
                                            {unreadCount}
                                        </span>
                                    )}
                                </button>

                                <button
                                    onClick={() => setShowEditProfile(!showEditProfile)}
                                    className="w-12 h-12 rounded-full border-2 border-[#D4AF37] bg-gray-800 flex items-center justify-center text-xl hover:bg-gray-700 transition-colors"
                                >
                                    {profileData.picture ? (
                                        <img src={profileData.picture} alt="Profile" className="w-full h-full rounded-full object-cover" />
                                    ) : (
                                        '👤'
                                    )}
                                </button>

                                <button
                                    onClick={handleLogout}
                                    className="bg-red-600 text-white px-4 py-2 rounded-full hover:bg-red-700 transition-colors"
                                >
                                    Logout
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <div className="max-w-7xl mx-auto px-6 py-10">
                        {/* Profile Edit Modal */}
                        {showEditProfile && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                                <div className="bg-[#111111] border border-[#D4AF37] rounded-3xl p-8 w-full max-w-md">
                                    <h2 className="text-3xl font-bold text-[#D4AF37] mb-6">Edit Profile</h2>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-300 mb-2">First Name</label>
                                            <input type="text" value={profileData.firstName || ''} onChange={(e) => setProfileData({...profileData, firstName: e.target.value})} className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-300 mb-2">Last Name</label>
                                            <input type="text" value={profileData.lastName || ''} onChange={(e) => setProfileData({...profileData, lastName: e.target.value})} className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-300 mb-2">Email</label>
                                            <input type="email" value={profileData.email || ''} disabled className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-gray-500 cursor-not-allowed" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-300 mb-2">Phone</label>
                                            <input type="tel" value={profileData.phone || ''} onChange={(e) => setProfileData({...profileData, phone: e.target.value})} className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white" />
                                        </div>
                                        <div className="flex gap-3 mt-6">
                                            <button onClick={() => {
                                                localStorage.setItem('jmpCurrentUser', JSON.stringify(profileData));
                                                updateUserRecord(profileData);
                                                setCurrentUser(profileData);
                                                setShowEditProfile(false);
                                                alert('Profile updated!');
                                            }} className="flex-1 bg-[#D4AF37] text-black py-2 rounded-full font-semibold hover:bg-opacity-80">Save</button>
                                            <button onClick={() => setShowEditProfile(false)} className="flex-1 border border-[#D4AF37] text-[#D4AF37] py-2 rounded-full font-semibold hover:bg-[#D4AF37] hover:text-black">Cancel</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Add Product Modal */}
                        {showAddProduct && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                                <div className="bg-[#111111] border border-[#D4AF37] rounded-3xl p-8 w-full max-w-md max-h-96 overflow-y-auto">
                                    <h2 className="text-3xl font-bold text-[#D4AF37] mb-6">Post Product</h2>
                                    <form onSubmit={handleAddProduct} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-300 mb-2">Product Images</label>
                                            <input type="file" multiple accept="image/*" onChange={(e) => setFormData({...formData, images: Array.from(e.target.files)})} className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-300 mb-2">Product Title</label>
                                            <input type="text" value={formData.title} onChange={(e) => setFormData({...formData, title: e.target.value})} placeholder="e.g., Luxury Watch" className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-300 mb-2">Description</label>
                                            <textarea value={formData.description} onChange={(e) => setFormData({...formData, description: e.target.value})} placeholder="Describe your product..." rows="3" className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white"></textarea>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-300 mb-2">Price (₦)</label>
                                            <input type="number" value={formData.price} onChange={(e) => setFormData({...formData, price: e.target.value})} placeholder="5000" className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white" />
                                            <p className="text-xs text-gray-400 mt-1">Note: A 10% website fee will be added to the listed price.</p>
                                        </div>
                                        <div className="flex gap-3 mt-6">
                                            <button type="submit" className="flex-1 bg-[#D4AF37] text-black py-2 rounded-full font-semibold hover:bg-opacity-80">Post Product</button>
                                            <button type="button" onClick={() => setShowAddProduct(false)} className="flex-1 border border-[#D4AF37] text-[#D4AF37] py-2 rounded-full font-semibold hover:bg-[#D4AF37] hover:text-black">Cancel</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        <h1 className="text-4xl font-bold text-[#D4AF37] mb-2">Welcome, {currentUser.firstName}!</h1>
                        <p className="text-gray-300 mb-10">Buy and sell premium items in our marketplace</p>

                        <button onClick={() => setShowAddProduct(true)} className="mb-10 bg-[#D4AF37] text-black px-8 py-3 rounded-full font-semibold text-lg hover:bg-opacity-80 transition-colors">➕ Post Product</button>

                        {userProducts.length > 0 && (
                            <div className="mb-12">
                                <h2 className="text-2xl font-bold text-[#D4AF37] mb-6">My Products</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {userProducts.map((product) => (
                                        <div key={product.id} className="rounded-3xl overflow-hidden border border-[#D4AF37] bg-[#111111] shadow-xl">
                                            <div className="h-48 bg-gray-800 flex items-center justify-center">
                                                {product.images && product.images.length > 0 ? (
                                                    <img src={product.images[0]} alt={product.title} className="w-full h-full object-cover" />
                                                ) : (
                                                    <span className="text-6xl">📦</span>
                                                )}
                                            </div>
                                            <div className="p-6">
                                                <div className="flex justify-between items-start mb-2">
                                                    <h3 className="text-xl font-bold text-white">{product.title}</h3>
                                                    {product.status === 'Pending' && <span className="bg-yellow-600 text-white text-xs px-2 py-1 rounded-full">Waiting for Approval</span>}
                                                    {product.status === 'Approved' && <span className="bg-green-600 text-white text-xs px-2 py-1 rounded-full">Approved</span>}
                                                </div>
                                                <p className="text-gray-300 text-sm mb-3">{product.description}</p>
                                                <p className="text-2xl font-bold text-[#D4AF37]">₦{parseInt(product.price).toLocaleString('en-NG')}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div>
                                                {product.images && product.images.length > 0 ? (
                                                    <img src={product.images[0]} alt={product.title} className="w-full h-full object-cover" />
                                                ) : (
                                                    <span className="text-6xl">📦</span>
                                                )}
                                            
                            <h2 className="text-2xl font-bold text-[#D4AF37] mb-6">Browse All Products</h2>
                            {allProducts.length > 0 ? (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {allProducts.map((product) => (
                                        <div key={product.id} className="rounded-3xl overflow-hidden border border-[#D4AF37] bg-[#111111] shadow-xl">
                                            <div className="h-48 bg-gray-800 flex items-center justify-center"><span className="text-6xl">📦</span></div>
                                            <div className="p-6">
                                                <h3 className="text-xl font-bold text-white mb-2">{product.title}</h3>
                                                <p className="text-gray-300 text-sm mb-3">{product.description}</p>
                                                <p className="text-2xl font-bold text-[#D4AF37]">₦{parseInt(product.price).toLocaleString('en-NG')}</p>
                                                <p className="text-gray-400 text-xs mt-2">By {product.userName}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="text-center py-10 border border-dashed border-[#D4AF37] rounded-3xl">
                                    <p className="text-gray-300 text-lg">No approved products yet</p>
                                    <p className="text-gray-400 text-sm">Products will appear here once they are approved by admins</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const Inbox = () => {
            const navigate = useNavigate();
            const [messages, setMessages] = useState([]);
            const [currentUser, setCurrentUser] = useState(null);
            const [showSellerRequest, setShowSellerRequest] = useState(false);
            const [sellerWhatsApp, setSellerWhatsApp] = useState('');
            const [sellerAddress, setSellerAddress] = useState('');
            const [error, setError] = useState('');

            useEffect(() => {
                const user = localStorage.getItem('jmpCurrentUser');
                if (user) {
                    const userData = JSON.parse(user);
                    setCurrentUser(userData);
                    const msgs = localStorage.getItem('jmpMessages');
                    if (msgs) {
                        const msgList = JSON.parse(msgs);
                        const userMessages = msgList
                            .filter(m => m.recipientEmail === userData.email)
                            .map(m => ({ ...m, read: m.read ?? false }));
                        setMessages(userMessages);
                    }
                    
                    // Request notification permission
                    if ('Notification' in window && Notification.permission === 'default') {
                        Notification.requestPermission();
                    }
                }
            }, []);

            useEffect(() => {
                if (!currentUser) return;
                
                const handleStorageChange = (event) => {
                    if (event.key !== 'jmpMessages') return;
                    try {
                        const msgList = JSON.parse(event.newValue || '[]');
                        const userMessages = msgList
                            .filter(m => m.recipientEmail === currentUser.email)
                            .map(m => ({ ...m, read: m.read ?? false }));
                        setMessages(userMessages);
                        
                        // Show notification for new messages
                        const lastMessage = userMessages[userMessages.length - 1];
                        if (lastMessage && 'Notification' in window && Notification.permission === 'granted') {
                            new Notification(lastMessage.title, {
                                body: lastMessage.content,
                                icon: 'Image/my-logo.png',
                                tag: lastMessage.id
                            });
                        }
                    } catch (error) {
                        console.error('Error processing message:', error);
                    }
                };

                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, [currentUser]);

            const markAllAsRead = () => {
                const user = localStorage.getItem('jmpCurrentUser');
                if (user) {
                    const userData = JSON.parse(user);
                    const allMsgs = JSON.parse(localStorage.getItem('jmpMessages') || '[]');
                    const updatedMsgs = allMsgs.map(m =>
                        m.recipientEmail === userData.email ? { ...m, read: true } : m
                    );
                    localStorage.setItem('jmpMessages', JSON.stringify(updatedMsgs));
                    setMessages(updatedMsgs.filter(m => m.recipientEmail === userData.email));
                }
            };

            const handleSellerRequest = (e) => {
                e.preventDefault();
                setError('');

                if (!sellerWhatsApp || !sellerAddress) {
                    setError('All fields are required.');
                    return;
                }

                // Update current user to seller status
                const updatedUser = {
                    ...currentUser,
                    role: 'seller',
                    sellerStatus: 'pending_approval',
                    businessWhatsApp: sellerWhatsApp,
                    businessAddress: sellerAddress
                };
                localStorage.setItem('jmpCurrentUser', JSON.stringify(updatedUser));
                setCurrentUser(updatedUser);

                // Update user in users list
                const users = JSON.parse(localStorage.getItem('jmpUsers') || '[]');
                const userIndex = users.findIndex(u => u.email === currentUser.email);
                if (userIndex !== -1) {
                    users[userIndex] = updatedUser;
                    localStorage.setItem('jmpUsers', JSON.stringify(users));
                }

                // Add message to inbox
                const allMsgs = JSON.parse(localStorage.getItem('jmpMessages') || '[]');
                allMsgs.push({
                    id: Date.now().toString(),
                    recipientEmail: currentUser.email,
                    title: 'Seller Request Submitted',
                    content: 'Your seller request has been sent for approval. You will be notified once reviewed.',

            if (typeof price === 'number') return price;
            return Number(String(price).replace(/[^0-9.]/g, '')) || 0;

                        reader.readAsDataURL(file);
                        await new Promise(resolve => reader.onload = resolve);
                        images.push(reader.result);
