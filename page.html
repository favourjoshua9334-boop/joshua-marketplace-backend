                                        <div className="flex gap-3 mt-6">
                                            <button type="submit" className="flex-1 bg-[#D4AF37] text-black py-2 rounded-full font-semibold hover:bg-opacity-80">Post Product</button>
                                            <button type="button" onClick={() => setShowAddProduct(false)} className="flex-1 border border-[#D4AF37] text-[#D4AF37] py-2 rounded-full font-semibold hover:bg-[#D4AF37] hover:text-black">Cancel</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Order History Modal */}
                        {showOrderHistory && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                                <div className="bg-[#111111] border border-[#D4AF37] rounded-3xl p-8 w-full max-w-4xl max-h-96 overflow-y-auto">
                                    <h2 className="text-3xl font-bold text-[#D4AF37] mb-6">Order History</h2>
                                    {orders.length > 0 ? (
                                        <div className="space-y-4">
                                            {orders.map((order) => (
                                                <div key={order.id} className="border border-[#D4AF37] rounded-3xl p-6">
                                                    <div className="flex justify-between items-start mb-4">
                                                        <div>
                                                            <h3 className="text-xl font-bold text-white">{order.productTitle}</h3>
                                                            <p className="text-gray-300 text-sm">{order.productDescription}</p>
                                                            <p className="text-[#D4AF37] font-bold mt-2">₦{Math.round(parsePrice(order.productPrice) * 1.1).toLocaleString('en-NG')}</p>
                                                        </div>
                                                        <div className="text-right">
                                                            <p className="text-gray-400 text-sm">Ordered on {new Date(order.orderDate).toLocaleDateString()}</p>
                                                            <span className={`text-xs px-2 py-1 rounded-full ${order.status === 'Ordered' ? 'bg-yellow-600 text-white' : order.status === 'Ready for Pickup' ? 'bg-green-600 text-white' : 'bg-red-600 text-white'}`}>
                                                                {order.status}
                                                            </span>
                                                        </div>
                                                    </div>
                                                    <div className="flex justify-between items-center">
                                                        <p className="text-gray-400 text-sm">Seller: {order.sellerName}</p>
                                                        {order.status === 'Ready for Pickup' && (
                                                            <div className="text-right">
                                                                <p className="text-gray-300 text-sm">Pickup at: New Yidi Road, Yinolu Pharmacy, Irewolede, Ilorin, Kwara State</p>
                                                                <p className="text-gray-300 text-sm">Transfer to: Bank: Opay, Name: Bamikole Victoria Kehinde, A/C: 7070252673</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <p className="text-gray-300 text-center">No orders yet</p>
                                    )}
                                    <div className="flex justify-end mt-6">
                                        <button onClick={() => setShowOrderHistory(false)} className="border border-[#D4AF37] text-[#D4AF37] py-2 px-6 rounded-full font-semibold hover:bg-[#D4AF37] hover:text-black">Close</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentUser ? (
                            <>
                                <h1 className="text-4xl font-bold text-[#D4AF37] mb-2">Welcome, {currentUser.firstName}!</h1>
                                <p className="text-gray-300 mb-10">Buy and sell premium items in our marketplace</p>

                                <button onClick={() => setShowAddProduct(true)} className="mb-10 bg-[#D4AF37] text-black px-8 py-3 rounded-full font-semibold text-lg hover:bg-opacity-80 transition-colors">➕ Post Product</button>

                                {userProducts.length > 0 && (
                                    <div className="mb-12">
                                        <h2 className="text-2xl font-bold text-[#D4AF37] mb-6">My Products</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {userProducts.map((product) => (
                                                <div key={product.id} className="rounded-3xl overflow-hidden border border-[#D4AF37] bg-[#111111] shadow-xl">
                                                    <div className="h-48 bg-gray-800 flex items-center justify-center">
                                                        {product.images && product.images.length > 0 ? (
                                                            <img src={product.images[0]} alt={product.title} className="w-full h-full object-cover" />
                                                        ) : (
                                                            <span className="text-6xl">📦</span>
                                                        )}
                                                    </div>
                                                    <div className="p-6">
                                                        <div className="flex justify-between items-start mb-2">
                                                            <h3 className="text-xl font-bold text-white">{product.title}</h3>
                                                            {product.status === 'Pending' && <span className="bg-yellow-600 text-white text-xs px-2 py-1 rounded-full">Waiting for Approval</span>}
                                                            {product.status === 'Approved' && <span className="bg-green-600 text-white text-xs px-2 py-1 rounded-full">Approved</span>}
                                                        </div>
                                                        <p className="text-gray-300 text-sm mb-3">{product.description}</p>
                                                        <p className="text-2xl font-bold text-[#D4AF37]">₦{parsePrice(product.price).toLocaleString('en-NG')}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div>
                                    <h2 className="text-2xl font-bold text-[#D4AF37] mb-6">Browse All Products</h2>
                                    {allProducts.length > 0 ? (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {allProducts.map((product) => (
                                                <div key={product.id} className="rounded-3xl overflow-hidden border border-[#D4AF37] bg-[#111111] shadow-xl">
                                                    <div className="h-48 bg-gray-800 flex items-center justify-center">
                                                        {product.images && product.images.length > 0 ? (
                                                            <img src={product.images[0]} alt={product.title} className="w-full h-full object-cover" />
                                                        ) : (
                                                            <span className="text-6xl">📦</span>
                                                        )}
                                                    </div>
                                                    <div className="p-6">
                                                        <h3 className="text-xl font-bold text-white mb-2">{product.title}</h3>
                                                        <p className="text-gray-300 text-sm mb-3">{product.description}</p>
                                                        <p className="text-2xl font-bold text-[#D4AF37]">₦{Math.round(parsePrice(product.price) * 1.1).toLocaleString('en-NG')}</p>
                                                        <p className="text-gray-400 text-xs mt-2 mb-4">By {product.userName}</p>
                                                        <div className="flex gap-2">
                                                            <button
                                                                onClick={() => navigate('/product/' + product.id)}
                                                                className="flex-1 border border-[#D4AF37] text-[#D4AF37] py-2 rounded-full font-semibold hover:bg-[#D4AF37] hover:text-black transition-colors"
                                                            >
                                                                View Details
                                                            </button>
                                                            <button
                                                                onClick={() => handleOrder(product)}
                                                                className="flex-1 bg-[#D4AF37] text-black py-2 rounded-full font-semibold hover:bg-opacity-80 transition-colors"
                                                            >
                                                                Order Now
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="text-center py-10 border border-dashed border-[#D4AF37] rounded-3xl">
                                            <p className="text-gray-300 text-lg">No approved products yet</p>
                                            <p className="text-gray-400 text-sm">Products will appear here once they are approved by admins</p>
                                        </div>
                                    )}
                                </div>
                            </>
                        ) : (
                            <div className="text-center py-20">
                                <h1 className="text-4xl font-bold text-[#D4AF37] mb-4">Access Restricted</h1>
                                <p className="text-gray-300 mb-8">You need to sign up or log in to access the marketplace.</p>
                                <button
                                    onClick={() => navigate('/signup')}
                                    className="bg-[#D4AF37] text-black px-8 py-3 rounded-full font-semibold hover:bg-opacity-80 transition-colors"
                                >
                                    Sign Up Now
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Admin Components
        const getUsers = () => {
            const stored = localStorage.getItem('jmpUsers');
            return stored ? JSON.parse(stored) : [];
        };

        const getProducts = () => {
            const stored = localStorage.getItem('jmpProducts');
            return stored ? JSON.parse(stored) : [];
        };

        const AdminDashboard = () => {
            const navigate = useNavigate();
            const [activeSection, setActiveSection] = useState('users');
            const [users, setUsers] = useState(getUsers());
            const [orders, setOrders] = useState([]);
            const [products, setProducts] = useState(getProducts());

            const [showRejectModal, setShowRejectModal] = useState(false);
            const [rejectReason, setRejectReason] = useState('');
            const [rejectingProductId, setRejectingProductId] = useState(null);

            useEffect(() => {
                const isAdmin = localStorage.getItem('jmpAdminAccess');
                if (isAdmin !== 'true') {
                    navigate('/');
                    return;
                }
                loadOrders();
            }, [navigate]);

            const loadOrders = () => {
                const stored = localStorage.getItem('jmpOrders');
                setOrders(stored ? JSON.parse(stored) : []);
            };

            const updateOrderStatus = (orderId, newStatus) => {
                const updated = orders.map(order =>
                    order.id === orderId ? { ...order, status: newStatus } : order
                );
                setOrders(updated);
                localStorage.setItem('jmpOrders', JSON.stringify(updated));

                // If ready for pickup, send message to buyer
                if (newStatus === 'Ready for Pickup') {
                    const order = updated.find(o => o.id === orderId);
                    if (order) {
                        const messages = JSON.parse(localStorage.getItem('jmpMessages') || '[]');
                        messages.push({
                            id: Date.now().toString(),
                            recipientEmail: order.buyerEmail,
                            title: 'Order Ready for Pickup',
                            content: `Your order for "${order.productTitle}" is ready for pickup at New Yidi Road, Yinolu Pharmacy, Irewolede, Ilorin, Kwara State. Transfer payment to: Bank: Opay, Name: Bamikole Victoria Kehinde, A/C: 7070252673`,
                            time: new Date().toLocaleString(),
                            read: false
                        });
                        localStorage.setItem('jmpMessages', JSON.stringify(messages));
                    }
                }
            };

            const updateProductStatus = (productId, newStatus, reason = null) => {
                if (newStatus === 'Rejected') {
                    if (!reason) {
                        // If no reason, open modal
                        setRejectingProductId(productId);
                        setShowRejectModal(true);
                        return;
                    }
                    // Send message
                    const product = products.find(p => p.id === productId);
                    if (product) {
                        const messages = JSON.parse(localStorage.getItem('jmpMessages') || '[]');
                        messages.push({
                            id: Date.now().toString(),
                            recipientEmail: product.userEmail,
                            title: 'Product Rejected',
                            content: `Your product "${product.title}" was rejected: ${reason}`,
                            time: new Date().toLocaleString(),
                            read: false
                        });
                        localStorage.setItem('jmpMessages', JSON.stringify(messages));
                    }
                }
                
                const updated = products.map(product =>
                    product.id === productId ? { ...product, status: newStatus } : product
                );
                setProducts(updated);
                localStorage.setItem('jmpProducts', JSON.stringify(updated));
            };

            const handleRejectSubmit = () => {
                if (!rejectReason.trim()) {
                    alert('Please provide a reason for rejection.');
                    return;
                }
                updateProductStatus(rejectingProductId, 'Rejected', rejectReason);
                setShowRejectModal(false);
                setRejectReason('');
                setRejectingProductId(null);
            };

            const deleteProduct = (productId) => {
                if (confirm('Are you sure you want to delete this product?')) {
                    const updated = products.filter(product => product.id !== productId);
                    setProducts(updated);
                    localStorage.setItem('jmpProducts', JSON.stringify(updated));
                }
            };

            const viewUserDetails = (userId) => {
                const user = users.find(u => u.id === userId);
                alert(`User Details:\nName: ${user.name}\nEmail: ${user.email}\nStatus: ${user.status}\nJoined: ${user.joined}\nBank Info: Account ending in ****1234`);
            };

            return (
                <div className="min-h-screen bg-[#0b0b0b] text-white">
                    <header className="bg-[#111111] border-b border-[#D4AF37] px-6 py-4">
                        <div className="flex items-center justify-between">
                            <h1 className="text-2xl font-bold text-[#D4AF37]">Admin Dashboard</h1>
                            <button
                                onClick={() => { localStorage.removeItem('jmpAdminAccess'); navigate('/'); }}
                                className="bg-[#D4AF37] text-black px-4 py-2 rounded-full font-semibold hover:bg-opacity-80 transition-colors"
                            >
                                Logout
                            </button>
                        </div>
                    </header>

                    <div className="flex">
                        <nav className="w-64 bg-[#111111] min-h-screen border-r border-[#D4AF37]">
                            <div className="p-6">
                                <h2 className="text-lg font-semibold text-[#D4AF37] mb-4">Management</h2>
                                <div className="space-y-2">
                                    <button
                                        onClick={() => setActiveSection('users')}
                                        className={`w-full text-left px-4 py-2 rounded-lg transition-colors ${activeSection === 'users' ? 'bg-[#D4AF37] text-black' : 'text-gray-300 hover:bg-gray-800'}`}
                                    >
                                        Users
                                        {users.length > 0 && <span className="ml-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">{users.length}</span>}
                                    </button>
                                    <button
                                        onClick={() => setActiveSection('orders')}
                                        className={`w-full text-left px-4 py-2 rounded-lg transition-colors ${activeSection === 'orders' ? 'bg-[#D4AF37] text-black' : 'text-gray-300 hover:bg-gray-800'}`}
                                    >
                                        Orders
                                        {orders.length > 0 && <span className="ml-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">{orders.length}</span>}
                                    </button>
                                    <button
                                        onClick={() => setActiveSection('products')}
                                        className={`w-full text-left px-4 py-2 rounded-lg transition-colors ${activeSection === 'products' ? 'bg-[#D4AF37] text-black' : 'text-gray-300 hover:bg-gray-800'}`}
                                    >
                                        Products
                                        {products.filter(p => p.status === 'Pending').length > 0 && <span className="ml-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">{products.filter(p => p.status === 'Pending').length}</span>}
                                    </button>
                                </div>
                            </div>
                        </nav>

                        <main className="flex-1 p-6">
                            {activeSection === 'users' && (
                                <div>
                                    <h2 className="text-3xl font-bold text-[#D4AF37] mb-6">Users</h2>
                                    <div className="bg-[#111111] border border-[#D4AF37] rounded-3xl overflow-hidden">
                                        <table className="w-full">
                                            <thead className="bg-[#D4AF37] text-black">
                                                <tr>
                                                    <th className="px-6 py-3 text-left">First Name</th>
                                                    <th className="px-6 py-3 text-left">Last Name</th>
                                                    <th className="px-6 py-3 text-left">Username</th>
                                                    <th className="px-6 py-3 text-left">Email</th>
                                                    <th className="px-6 py-3 text-left">Phone</th>
                                                    <th className="px-6 py-3 text-left">Joined</th>
                                                    <th className="px-6 py-3 text-left">Actions</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {users.map(user => (
                                                    <tr key={user.id || user.username} className="border-t border-gray-700">
                                                        <td className="px-6 py-4">{user.firstName || user.name?.split(' ')[0]}</td>
                                                        <td className="px-6 py-4">{user.lastName || user.name?.split(' ')[1]}</td>
                                                        <td className="px-6 py-4">{user.username}</td>
                                                        <td className="px-6 py-4">{user.email}</td>
                                                        <td className="px-6 py-4">{user.phone}</td>
                                                        <td className="px-6 py-4">{user.joined || new Date().toISOString().split('T')[0]}</td>
                                                        <td className="px-6 py-4">
                                                            <button
                                                                onClick={() => viewUserDetails(user.id || user.username)}
                                                                className="bg-[#D4AF37] text-black px-3 py-1 rounded text-sm hover:bg-opacity-80"
                                                            >
                                                                View Details
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {activeSection === 'orders' && (
                                <div>
                                    <h2 className="text-3xl font-bold text-[#D4AF37] mb-6">Orders</h2>
                                    <div className="bg-[#111111] border border-[#D4AF37] rounded-3xl overflow-hidden">
                                        <table className="w-full">
                                            <thead className="bg-[#D4AF37] text-black">
                                                <tr>
                                                    <th className="px-6 py-3 text-left">Order ID</th>
                                                    <th className="px-6 py-3 text-left">Product</th>
                                                    <th className="px-6 py-3 text-left">Buyer</th>
                                                    <th className="px-6 py-3 text-left">Seller</th>
                                                    <th className="px-6 py-3 text-left">Price</th>
                                                    <th className="px-6 py-3 text-left">Status</th>
                                                    <th className="px-6 py-3 text-left">Actions</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {orders.map((order) => (
                                                    <tr key={order.id} className="border-t border-gray-700">
                                                        <td className="px-6 py-4">{order.id}</td>
                                                        <td className="px-6 py-4">{order.productTitle}</td>
                                                        <td className="px-6 py-4">{order.buyerName}</td>
                                                        <td className="px-6 py-4">{order.sellerName}</td>
                                                        <td className="px-6 py-4">₦{Math.round(parseInt(order.productPrice) * 1.1).toLocaleString('en-NG')}</td>
                                                        <td className="px-6 py-4">
                                                            <select
                                                                value={order.status}
                                                                onChange={(e) => updateOrderStatus(order.id, e.target.value)}
                                                                className="bg-gray-800 border border-[#D4AF37] rounded px-2 py-1 text-white"
                                                            >
                                                                <option value="Ordered">Ordered</option>
                                                                <option value="Processing">Processing</option>
                                                                <option value="Ready for Pickup">Ready for Pickup</option>
                                                                <option value="Completed">Completed</option>
                                                                <option value="Cancelled">Cancelled</option>
                                                            </select>
                                                        </td>
                                                        <td className="px-6 py-4">
                                                            <button className="text-[#D4AF37] hover:underline">View Details</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {activeSection === 'products' && (
                                <div>
                                    <h2 className="text-3xl font-bold text-[#D4AF37] mb-6">Products</h2>
                                    <div className="bg-[#111111] border border-[#D4AF37] rounded-3xl overflow-hidden">
                                        <table className="w-full">
                                            <thead className="bg-[#D4AF37] text-black">
                                                <tr>
                                                    <th className="px-6 py-3 text-left">Title</th>
                                                    <th className="px-6 py-3 text-left">Description</th>
                                                    <th className="px-6 py-3 text-left">Price</th>
                                                    <th className="px-6 py-3 text-left">Status</th>
                                                    <th className="px-6 py-3 text-left">Actions</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {products.map(product => (
                                                    <tr key={product.id} className="border-t border-gray-700">
                                                        <td className="px-6 py-4">{product.title}</td>
                                                        <td className="px-6 py-4">{product.description}</td>
                                                        <td className="px-6 py-4">₦{parsePrice(product.price).toLocaleString('en-NG')}</td>
                                                        <td className="px-6 py-4">
                                                            <span className={`px-2 py-1 rounded-full text-xs ${
                                                                product.status === 'Approved' ? 'bg-green-600 text-white' :
                                                                product.status === 'Pending' ? 'bg-yellow-600 text-white' :
                                                                'bg-red-600 text-white'
                                                            }`}>
                                                                {product.status}
                                                            </span>
                                                        </td>
                                                        <td className="px-6 py-4">
                                                            {product.status === 'Pending' && (
                                                                <>
                                                                    <button
                                                                        onClick={() => updateProductStatus(product.id, 'Approved')}
                                                                        className="bg-green-600 text-white px-3 py-1 rounded text-sm mr-2 hover:bg-green-700"
                                                                    >
                                                                        Approve
                                                                    </button>
                                                                    <button
                                                                        onClick={() => updateProductStatus(product.id, 'Rejected')}
                                                                        className="bg-red-600 text-white px-3 py-1 rounded text-sm mr-2 hover:bg-red-700"
                                                                    >
                                                                        Reject
                                                                    </button>
                                                                </>
                                                            )}
                                                            <button
                                                                onClick={() => deleteProduct(product.id)}
                                                                className="bg-gray-600 text-white px-3 py-1 rounded text-sm hover:bg-gray-700"
                                                            >
                                                                Delete
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* Reject Product Modal */}
                    {showRejectModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                            <div className="bg-[#111111] border border-[#D4AF37] rounded-3xl p-8 w-full max-w-md">
                                <h2 className="text-3xl font-bold text-[#D4AF37] mb-6">Reject Product</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-300 mb-2">Reason for Rejection</label>
                                        <textarea
                                            value={rejectReason}
                                            onChange={(e) => setRejectReason(e.target.value)}
                                            placeholder="Please provide a detailed reason for rejecting this product..."
                                            rows="4"
                                            className="w-full px-3 py-2 bg-gray-800 border border-[#D4AF37] rounded-md text-white focus:outline-none focus:ring-2 focus:ring-[#D4AF37] focus:border-transparent"
                                        />
                                    </div>
                                    <div className="flex gap-3 mt-6">
                                        <button
                                            onClick={handleRejectSubmit}
                                            className="flex-1 bg-red-600 text-white py-2 rounded-full font-semibold hover:bg-red-700"
                                        >
                                            Reject Product
                                        </button>
                                        <button
                                            onClick={() => { setShowRejectModal(false); setRejectReason(''); setRejectingProductId(null); }}
                                            className="flex-1 border border-[#D4AF37] text-[#D4AF37] py-2 rounded-full font-semibold hover:bg-[#D4AF37] hover:text-black"
                                        >
                                            Cancel
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const App = () => (
            <HashRouter>
                <div className="min-h-screen flex flex-col">
                    <div className="flex-grow">
                        <Routes>
                            <Route path="/" element={<LandingPage />} />
                            <Route path="/signup" element={<Signup />} />
                            <Route path="/login" element={<Login />} />
                            <Route path="/profile-setup" element={<ProfileSetup />} />
                            <Route path="/admin-login" element={<AdminLogin />} />
                            <Route path="/inbox" element={<Inbox />} />
                            <Route path="/marketplace" element={<MarketplaceDashboard />} />
                            <Route path="/admin" element={<AdminDashboard />} />
                            <Route path="*" element={<LandingPage />} />
                        </Routes>
                    </div>
                    <Footer />
                </div>
            </HashRouter>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    </script>
</body>
</html>
